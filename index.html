<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nijhuis · Kids Savings</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020c1a;--s1:#071428;--s2:#0a1c36;--s3:#0f2444;
  --b1:#1a3050;--b2:#243d63;--b3:#2e4f7a;
  --t1:#e8f0f8;--t2:#8aa8c8;--t3:#4a6880;--t4:#2a4060;
  --blue:#4d9ef8;--green:#2dd4a0;--amber:#f4b942;--red:#f06868;
  --violet:#9b7ff4;--cyan:#3ecfcf;--orange:#fb923c;--pink:#f472b6;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{background:var(--bg);color:var(--t2);font-family:var(--sans);min-height:100vh;padding-bottom:60px}

/* ── HEADER ── */
.hdr{background:linear-gradient(180deg,#030f20 0%,#071428 100%);border-bottom:1px solid var(--b1);padding:20px 28px 0}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.brand{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--t3);text-transform:uppercase;margin-bottom:3px}
.title{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.hdr-kpis{display:flex;gap:8px;flex-wrap:wrap}
.hk{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:8px 14px;min-width:110px}
.hk-lbl{font-size:8px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.hk-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--t1);letter-spacing:-1px;line-height:1}
.hk-sub{font-size:9px;font-family:var(--mono);color:var(--t4);margin-top:2px}

/* ── PLAT NAV ── */
.plat-nav{display:flex;align-items:center;gap:0;border-top:1px solid var(--b1);padding:0 28px;height:32px;background:var(--bg)}

/* ── TABS ── */
.tabs-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:8px}
.tabs{display:flex;gap:2px;flex-wrap:wrap}
.tab-btn{padding:8px 16px;border-radius:6px 6px 0 0;border:1px solid var(--b1);border-bottom:none;background:transparent;color:var(--t3);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s}
.tab-btn.active{background:var(--bg);color:var(--t1)}
.tab-btn:hover:not(.active){color:var(--t2)}
.ctrl-btn{padding:6px 13px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s}
.ctrl-btn:hover{border-color:var(--green);color:var(--green)}
.ctrl-btn.primary{border-color:var(--blue);color:var(--blue);background:rgba(77,158,248,.07)}

/* ── CONTENT ── */
.content{padding:20px 28px}
.tab-panel{display:none}.tab-panel.active{display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
@media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.g2,.g4{grid-template-columns:1fr}}

/* ── PANEL ── */
.panel{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:16px;margin-bottom:14px}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.panel-title{font-size:10px;font-family:var(--mono);font-weight:500;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.accent{display:inline-block;width:3px;height:12px;border-radius:99px;margin-right:7px;vertical-align:middle}

/* ── KID CARD ── */
.kid-card{background:var(--s2);border:1px solid var(--b1);border-radius:10px;overflow:hidden;transition:border-color .15s;cursor:pointer}
.kid-card:hover{border-color:var(--b2)}
.kid-stripe{height:3px}
.kid-body{padding:14px 16px}
.kid-name{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:2px}
.kid-dob{font-size:9px;font-family:var(--mono);color:var(--t3);margin-bottom:12px}
.kid-total{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-1px;line-height:1;margin-bottom:3px}
.kid-growth{font-size:10px;font-family:var(--mono);color:var(--green);margin-bottom:12px}
.kid-acc{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(26,48,80,.3);font-size:10px}
.kid-acc:last-child{border-bottom:none}
.kid-acc-lbl{color:var(--t3)}
.kid-acc-val{font-family:var(--mono);color:var(--t2);font-weight:600}
.kid-est{margin-top:10px;padding-top:10px;border-top:1px solid rgba(26,48,80,.4);display:flex;justify-content:space-between;align-items:baseline}
.kid-est-lbl{font-size:9px;font-family:var(--mono);color:var(--t3)}
.kid-est-val{font-size:13px;font-weight:700;font-family:var(--mono)}
.kid-age18{font-size:9px;font-family:var(--mono);color:var(--t4);text-align:right;margin-top:2px}

/* ── STAT ROWS ── */
.stat-r{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid rgba(26,48,80,.3)}
.stat-r:last-child{border-bottom:none}
.stat-lbl{font-size:11px;color:var(--t3)}
.stat-val{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--t1)}

/* ── ACCOUNT NUMBER BADGE ── */
.acct-badge{font-size:9px;font-family:var(--mono);color:var(--t4);letter-spacing:.05em}

/* ── HISTORY TABLE ── */
.hist-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.hist-table{border-collapse:collapse;font-size:11px;min-width:600px;width:100%}
.hist-table th{padding:7px 10px;font-size:9px;font-family:var(--mono);font-weight:500;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--b1);text-align:right;white-space:nowrap}
.hist-table th:first-child{text-align:left;min-width:160px}
.hist-table td{padding:5px 10px;border-bottom:1px solid rgba(26,48,80,.25);font-family:var(--mono);font-size:11px;text-align:right;white-space:nowrap}
.hist-table td:first-child{text-align:left;color:var(--t3);font-size:10px}
.hist-table tr.total-row td{background:rgba(77,158,248,.04);font-weight:700;color:var(--t1);border-top:1px solid var(--b2)}
.hist-table tr.kid-section td{background:var(--s2);font-size:9px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:6px 10px}

/* ── EDITOR MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;overflow-y:auto;padding:20px}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:10px;padding:24px;max-width:540px;width:100%;margin:auto}
.modal-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:16px}
.modal-section{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--b1)}
.modal-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.modal-kid-title{font-size:11px;font-weight:700;margin-bottom:10px}
.modal-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;gap:10px}
.modal-lbl{font-size:10px;color:var(--t3);flex:1}
.modal-lbl small{display:block;font-size:9px;color:var(--t4);margin-top:1px}
.modal-input{background:var(--s2);border:1px solid var(--b1);border-radius:5px;padding:5px 8px;color:var(--t1);font-family:var(--mono);font-size:12px;outline:none;width:110px;text-align:right;transition:border-color .15s}
.modal-input:focus{border-color:var(--blue)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-primary{padding:8px 20px;border-radius:6px;border:1px solid var(--blue);background:rgba(77,158,248,.1);color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-primary:hover{background:rgba(77,158,248,.2)}
.btn-ghost{padding:8px 14px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:12px;cursor:pointer;font-family:var(--sans)}
.new-date-notice{background:rgba(244,185,66,.07);border:1px solid rgba(244,185,66,.2);border-radius:5px;padding:6px 10px;font-size:10px;font-family:var(--mono);color:var(--amber);margin-top:6px;display:none}

/* ── RETURN RATE INPUT ── */
.return-input{background:var(--s2);border:1px solid var(--b1);border-radius:5px;padding:4px 8px;color:var(--t1);font-family:var(--mono);font-size:12px;outline:none;width:60px;text-align:right;display:inline-block}
.return-input:focus{border-color:var(--blue)}

/* ── CHART ── */
.chart-h240{position:relative;height:240px}
.chart-h200{position:relative;height:200px}

/* ── SYNC BADGE ── */
.sync-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:9px;font-family:var(--mono);margin-top:5px;border:1px solid}
.sync-ok{background:rgba(45,212,160,.07);border-color:rgba(45,212,160,.2);color:var(--green);cursor:pointer}
.sync-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.pulse{animation:pulse 2s infinite}

/* ── SAVE FLASH ── */
.save-flash{position:fixed;bottom:20px;right:20px;background:var(--s2);border:1px solid var(--green);border-radius:7px;padding:10px 18px;color:var(--green);font-size:12px;font-family:var(--mono);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.save-flash.show{opacity:1}

/* ── PROGRESS BAR ── */
.prog-wrap{background:var(--b1);border-radius:99px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px}

/* ══════════════════════════════════════════════════════════════
   PRINT VIEW · dark navy (matches dashboard)
   ══════════════════════════════════════════════════════════════ */
#printView{display:none}

@media print{
  @page{size:A4;margin:0}
  html,body{background:var(--bg)!important;color:var(--t1)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{padding:0!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .hdr,.content,.modal-overlay,.save-flash{display:none!important}
  #printView{display:block!important;background:var(--bg);color:var(--t1);font-family:var(--sans);padding:9mm 10mm;min-height:100vh}
  .pv-card,.pv-kpi,.pv-tbl,.pv-cards{break-inside:avoid;page-break-inside:avoid}
}

#printView *{box-sizing:border-box}
.pv-hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--b1);padding-bottom:9px;margin-bottom:11px}
.pv-brand{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);margin-bottom:3px}
.pv-title{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.4px;line-height:1.1}
.pv-sub{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:3px}
.pv-meta{font-family:var(--mono);font-size:9px;color:var(--t3);text-align:right;line-height:1.5}
.pv-meta strong{color:var(--t2);font-weight:600}

.pv-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:11px}
.pv-kpi{background:var(--s2);border:1px solid var(--b1);border-radius:7px;padding:8px 11px}
.pv-kpi.k-amber{border-top:2px solid var(--amber)}
.pv-kpi.k-green{border-top:2px solid var(--green)}
.pv-kpi.k-cyan{border-top:2px solid var(--cyan)}
.pv-kpi.k-blue{border-top:2px solid var(--blue)}
.pv-kpi-lbl{font-family:var(--mono);font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.pv-kpi.k-amber .pv-kpi-lbl{color:var(--amber)}
.pv-kpi.k-green .pv-kpi-lbl{color:var(--green)}
.pv-kpi.k-cyan .pv-kpi-lbl{color:var(--cyan)}
.pv-kpi.k-blue .pv-kpi-lbl{color:var(--blue)}
.pv-kpi-val{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--t1);letter-spacing:-.5px;line-height:1}
.pv-kpi-sub{font-family:var(--mono);font-size:7.5px;color:var(--t4);margin-top:3px}

.pv-section{margin-bottom:11px}
.pv-section-title{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--b1)}

.pv-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pv-card{background:var(--s2);border:1px solid var(--b1);border-radius:7px;overflow:hidden}
.pv-card-stripe{height:3px}
.pv-card-body{padding:9px 11px}
.pv-card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.pv-card-name{font-size:13px;font-weight:700;color:var(--t1)}
.pv-card-dob{font-family:var(--mono);font-size:7.5px;color:var(--t4);margin-top:1px;white-space:nowrap}
.pv-card-total{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:-.4px;text-align:right}
.pv-card-growth{font-family:var(--mono);font-size:8.5px;margin-top:1px;text-align:right}
.pv-card-rows{margin-top:7px}
.pv-card-row{display:flex;justify-content:space-between;font-size:9.5px;padding:2.5px 0;border-bottom:1px solid rgba(26,48,80,.4)}
.pv-card-row:last-child{border-bottom:none}
.pv-card-lbl{color:var(--t3)}
.pv-card-val{font-family:var(--mono);color:var(--t2);font-weight:600}
.pv-card-est{display:flex;justify-content:space-between;align-items:baseline;margin-top:6px;padding-top:6px;border-top:1px solid var(--b1)}
.pv-card-est-lbl{font-size:9.5px;color:var(--t3)}
.pv-card-est-val{font-family:var(--mono);font-size:12px;font-weight:700}

.pv-tbl{width:100%;border-collapse:collapse;font-size:9.5px;background:var(--s1);border:1px solid var(--b1);border-radius:7px;overflow:hidden}
.pv-tbl th{background:var(--s2);padding:5px 9px;font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-weight:500;text-align:right;border-bottom:1px solid var(--b1)}
.pv-tbl th:first-child{text-align:left}
.pv-tbl td{padding:3.5px 9px;font-family:var(--mono);text-align:right;border-bottom:1px solid rgba(26,48,80,.4);color:var(--t2)}
.pv-tbl td:first-child{text-align:left;font-family:var(--sans);color:var(--t3)}
.pv-tbl tr.pv-kid-row td{padding:3px 9px;font-family:var(--mono);font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;background:var(--s2)}
.pv-tbl tr.pv-total-row td{background:rgba(77,158,248,.06);font-weight:700;color:var(--t1);border-top:1px solid var(--b2)}
.pv-tbl tr.pv-grand-row td{background:rgba(45,212,160,.12);font-weight:700;color:var(--green);border-top:2px solid var(--green)}
.pv-acct{font-family:var(--mono);font-size:7.5px;color:var(--t4);margin-left:6px;letter-spacing:.03em}

.pv-footer{margin-top:10px;padding-top:7px;border-top:1px solid var(--b1);display:flex;justify-content:space-between;font-family:var(--mono);font-size:7.5px;color:var(--t4)}

/* Export button on screen */
.export-btn{padding:6px 13px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-left:6px;transition:all .15s}
.export-btn:hover{border-color:var(--green);color:var(--green)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="brand">Nijhuis Finance</div>
      <div class="title">Kids Savings · BrandNewDay</div>
      <div class="sync-badge sync-ok" id="cfSyncBadge" onclick="writeCFFeeds()" title="Click to push to Cash Flow">
        <span class="sync-dot pulse"></span>
        <span id="cfSyncLabel">Push to Cash Flow</span>
      </div>
    </div>
    <div class="hdr-kpis" id="hdrKpis"></div>
  </div>
  <div class="plat-nav">
    <button onclick="if(window.parent&&window.parent!==window){window.parent.showOv();}else{window.location.href='index.html';}" style="display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:0 10px 0 0;color:var(--t3);font-size:10px;font-family:var(--mono);letter-spacing:.05em;border-right:1px solid var(--b1);margin-right:12px;height:32px;transition:color .15s" onmouseover="this.style.color='var(--t2)'" onmouseout="this.style.color='var(--t3)'">
      <span style="font-size:14px">←</span> Dashboard
    </button>
    <span style="font-size:10px;font-family:var(--mono);color:var(--t4)">Nijhuis Finance Platform</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <label style="font-size:9px;font-family:var(--mono);color:var(--t3)">Return rate
        <input class="return-input" id="returnRate" type="number" step="0.1" value="7.0" onchange="persist(DATA);renderAll()">
        <span style="font-size:9px;color:var(--t4)">%</span>
      </label>
    </div>
  </div>
  <div class="tabs-row">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
      <button class="tab-btn" onclick="switchTab('aiden')">Aiden</button>
      <button class="tab-btn" onclick="switchTab('charlie')">Charlie</button>
      <button class="tab-btn" onclick="switchTab('jonathan')">Jonathan</button>
      <button class="tab-btn" onclick="switchTab('josephine')">Josephine</button>
      <button class="tab-btn" onclick="switchTab('history')">History</button>
    </div>
    <div style="display:flex;gap:6px">
      <button class="export-btn" onclick="exportPDF()" title="Print/Save as PDF in Roamler style">⇩ Export PDF</button>
      <button class="ctrl-btn primary" onclick="openEditor()">+ Update balances</button>
    </div>
  </div>
</div>

<!-- ══ PRINT VIEW (Roamler/ACFO style) ══ -->
<div id="printView"></div>

<div class="content">

<!-- ══ OVERVIEW ══ -->
<div class="tab-panel active" id="tab-overview">
  <div class="g4" id="kidCards"></div>
  <div class="g2">
    <div class="panel">
      <div class="panel-hdr"><span class="panel-title">Total savings over time</span></div>
      <div class="chart-h240"><canvas id="chartTotal"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><span class="panel-title">Projected value at age 18</span></div>
      <div class="chart-h240"><canvas id="chartProjected"></canvas></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-hdr">
      <span class="panel-title">Summary · <span id="lastUpdateLabel">—</span></span>
    </div>
    <div id="summaryTable"></div>
  </div>
</div>

<!-- ══ KID DETAIL TABS ══ -->
<div class="tab-panel" id="tab-aiden"></div>
<div class="tab-panel" id="tab-charlie"></div>
<div class="tab-panel" id="tab-jonathan"></div>
<div class="tab-panel" id="tab-josephine"></div>

<!-- ══ HISTORY ══ -->
<div class="tab-panel" id="tab-history">
  <div class="panel" style="padding:0;overflow:hidden">
    <div class="hist-wrap">
      <table class="hist-table" id="histTable"></table>
    </div>
  </div>
</div>

</div><!-- /content -->

<!-- ══ EDITOR MODAL ══ -->
<div class="modal-overlay" id="editorModal">
  <div class="modal">
    <div class="modal-title">Update Account Balances</div>
    <div class="modal-section">
      <div class="modal-row">
        <span class="modal-lbl">Date of this update<small>e.g. "Mar '26" or "31 Mar 2026"</small></span>
        <input class="modal-input" id="ed_date" style="width:130px" oninput="checkNewDate()">
      </div>
      <div class="new-date-notice" id="newDateNotice">📌 New date point — will be added to charts</div>
    </div>
    <div id="editorFields"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeEditor()">Cancel</button>
      <button class="btn-primary" onclick="saveEditor()">Save</button>
    </div>
  </div>
</div>

<div class="save-flash" id="saveFlash">✓ Saved</div>

<script>

// ══ DATA LAYER ════════════════════════════════════════════════
let DATA;
function loadData(){

function persist(d){

// ══ HELPERS ══════════════════════════════════════════════════
const fmtE = v => {
  if(v==null||isNaN(v)) return '—';
  const n=Math.round(Math.abs(v));
  return (v<0?'−':'')+'€'+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');
};
const fmtK = v => { const k=Math.round(v/1000); return '€'+Math.abs(k)+'K'; };

function kidTotal(kidId, dateIdx){
  const kd = DATA.kids[kidId];
  if(!kd) return 0;
  const idx = dateIdx !== undefined ? dateIdx : DATA.dates.length - 1;
  return kd.accounts.reduce((s, acc) => s + (acc[idx] || 0), 0);
}

function allTotal(dateIdx){
  return KID_CONFIG.reduce((s, k) => s + kidTotal(k.id, dateIdx), 0);
}

function ageAtDate(dob, dateLabel){
  // Rough age calculation from DOB string
  const dobDate = new Date(dob);
  const now = new Date();
  return Math.floor((now - dobDate) / (365.25 * 24 * 3600 * 1000));
}

function yearsTo18(dob){
  const dobDate = new Date(dob);
  const age18 = new Date(dobDate);
  age18.setFullYear(dobDate.getFullYear() + 18);
  const now = new Date();
  return Math.max(0, (age18 - now) / (365.25 * 24 * 3600 * 1000));
}

function projectedAt18Account(kidId, accIdx){
  // Use BND's own per-account estimate if available, else compute
  const kd = DATA.kids[kidId];
  const est = Array.isArray(kd.estAt18) ? kd.estAt18[accIdx] : null;
  if(est) return est;
  // Fallback: compound growth of current balance
  const r   = (parseFloat(document.getElementById('returnRate')?.value) || DATA.returnRate || 7) / 100;
  const cfg = KID_CONFIG.find(k => k.id === kidId);
  const yrs = yearsTo18(cfg.dob);
  const li  = DATA.dates.length - 1;
  const bal = (kd.accounts[accIdx] || [])[li] || 0;
  return Math.round(bal * Math.pow(1 + r, yrs));
}

function projectedAt18(kidId){
  const kd  = DATA.kids[kidId];
  const cfg = KID_CONFIG.find(k => k.id === kidId);
  // Sum of per-account BND estimates (or computed fallback)
  if(Array.isArray(kd.estAt18) && kd.estAt18.some(v=>v)){
    return kd.estAt18.reduce((s,v) => s+(v||0), 0);
  }
  // Legacy: single estAt18 number
  if(typeof kd.estAt18 === 'number') return kd.estAt18;
  // Compute from current balances
  const r   = (parseFloat(document.getElementById('returnRate')?.value) || DATA.returnRate || 7) / 100;
  const yrs = yearsTo18(cfg.dob);
  const li  = DATA.dates.length - 1;
  const monthly = 75;
  const monthlyFV = r > 0 ? monthly * 12 * ((Math.pow(1+r,yrs)-1)/r) : monthly*12*yrs;
  return kd.accounts.reduce((s, acc) => s + Math.round((acc[li]||0)*Math.pow(1+r,yrs)), Math.round(monthlyFV));
}

function writeCFFeeds(){
  try {
    const total = allTotal();
    const feeds = JSON.parse(localStorage.getItem(INV_CF_KEY) || '{}');
    // Use latest date as month for CF
    const lastDate = DATA.dates[DATA.dates.length - 1];
    const ym = parseDateToYM(lastDate);
    feeds['kids_saxo'] = {
      value_eur: total,
      date_ym:   ym || '2026-02',
      label:     'Kids BrandNewDay · all accounts',
    };
    localStorage.setItem(INV_CF_KEY, JSON.stringify(feeds));
    localStorage.setItem(INV_CF_TS, new Date().toISOString());
    const el = document.getElementById('cfSyncLabel');
    if(el) el.textContent = 'Synced to CF · ' + fmtE(total) + ' · ' + lastDate;
  } catch(e){ console.error('writeCFFeeds:', e); }
}

function parseDateToYM(str){
  if(!str) return null;
  const months = {jan:1,feb:2,mrt:3,mar:3,maa:3,apr:4,mei:5,may:5,
                  jun:6,jul:7,aug:8,sep:9,okt:10,oct:10,nov:11,dec:12};
  const parts = str.toLowerCase().replace(/\./g,' ').split(/[\s,'/]+/).filter(Boolean);
  let year = null, month = null;
  parts.forEach(p => {
    if(/^\d{4}$/.test(p)) year = parseInt(p);
    const mo = months[p.slice(0,3)];
    if(mo) month = mo;
  });
  if(!year || !month) return null;
  return year + '-' + String(month).padStart(2,'0');
}

  KID_CONFIG.forEach(cfg => {
    const kd = DATA.kids[cfg.id];
    // Kid section row
    html += `<tr class="kid-section"><td colspan="${dates.length+1}" style="color:${cfg.color}">${cfg.name}</td></tr>`;
    cfg.accounts.forEach((acc, i) => {
      const vals = kd.accounts[i] || [];
      html += `<tr>
        <td>${acc.label} <span class="acct-badge">${acc.acct}</span></td>
        ${dates.map((_,di) => `<td>${vals[di] != null ? fmtE(vals[di]) : '—'}</td>`).join('')}
      </tr>`;
    });
    // Kid total row
    html += `<tr class="total-row">
      <td>${cfg.name} total</td>
      ${dates.map((_,di) => `<td>${fmtE(kidTotal(cfg.id, di))}</td>`).join('')}
    </tr>`;
  });

  // Grand total
  html += `<tr class="total-row" style="background:rgba(45,212,160,.06)">
    <td style="color:var(--green)">Grand total</td>
    ${dates.map((_,di) => `<td style="color:var(--green)">${fmtE(allTotal(di))}</td>`).join('')}
  </tr>`;

  html += '</tbody>';
  document.getElementById('histTable').innerHTML = html;
}

    cfg.accounts.forEach((acc, i) => {
      const v = kd.accounts[i] ? kd.accounts[i][li] : '';
      html += `<div class="modal-row">
        <span class="modal-lbl">${acc.label}<small>${acc.acct}</small></span>

  document.getElementById('editorModal').classList.add('open');
}

  const isNew = val && val !== DATA.dates[li];
  document.getElementById('newDateNotice').style.display = isNew ? 'block' : 'none';
}

function saveEditor(){
  const dateVal = document.getElementById('ed_date').value.trim();
  if(!dateVal) return;

  const li = DATA.dates.length - 1;
  const isNew = dateVal !== DATA.dates[li];

  if(isNew){
    DATA.dates.push(dateVal);
    KID_CONFIG.forEach(cfg => {
      DATA.kids[cfg.id].accounts.forEach((_, i) => {
        DATA.kids[cfg.id].accounts[i].push(null);
      });
    });
  }

  const newLi = DATA.dates.length - 1;
  KID_CONFIG.forEach(cfg => {
    cfg.accounts.forEach((_, i) => {
      const v = parseFloat(document.getElementById(`ed_${cfg.id}_${i}`)?.value);
      if(!isNaN(v)) DATA.kids[cfg.id].accounts[i][newLi] = v;
    });
    const est = parseFloat(document.getElementById(`ed_${cfg.id}_est`)?.value);
    if(!isNaN(est)) DATA.kids[cfg.id].estAt18 = est;
  });

  DATA.returnRate = parseFloat(document.getElementById('returnRate')?.value) || 7;
  persist(DATA);
  writeCFFeeds();
  closeEditor();
  flashSave();
  renderAll();
}

// ══ TABS & RENDER ══════════════════════════════════════════
function switchTab(name){
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    if(b.textContent.trim().toLowerCase() === name.toLowerCase()) b.classList.add('active');
  });
  document.getElementById('tab-' + name).classList.add('active');

  if(name === 'overview'){ buildCharts(); buildSummaryTable(); }
  if(name === 'history')  buildHistory();
  const cfg = KID_CONFIG.find(k => k.id === name);
  if(cfg) buildKidDetailTab(cfg);
}

function renderAll(){
  DATA.returnRate = parseFloat(document.getElementById('returnRate')?.value) || DATA.returnRate || 7;
  buildHeader();
  buildKidCards();
  // Re-render active tab
  const active = document.querySelector('.tab-panel.active');
  if(active){
    const id = active.id.replace('tab-','');
    if(id === 'overview'){ buildCharts(); buildSummaryTable(); }
    else if(id === 'history') buildHistory();
    else { const cfg = KID_CONFIG.find(k => k.id === id); if(cfg) buildKidDetailTab(cfg); }
  }
}

// ══ PDF EXPORT (Roamler/ACFO style) ════════════════════════
function buildPrintView(){
  const li = DATA.dates.length - 1;
  const total = allTotal(li);
  const start = allTotal(0);
  const growth = start > 0 ? ((total - start) / start * 100).toFixed(1) : '—';
  const totalEst = KID_CONFIG.reduce((s, k) => s + projectedAt18(k.id), 0);
  const printedAt = new Date().toLocaleString('nl-NL', {dateStyle:'long',timeStyle:'short'});

  // ── Header
  let html = `
    <div class="pv-hdr">
      <div>
        <div class="pv-brand">Nijhuis Family Office</div>
        <div class="pv-title">Kids Savings · BrandNewDay</div>
        <div class="pv-sub">Overview as of ${DATA.dates[li]}</div>
      </div>
      <div class="pv-meta">
        <div><strong>4 kids</strong> · 12 BND accounts</div>
        <div>Printed ${printedAt}</div>
      </div>
    </div>
  `;

  // ── KPIs (colors mirror dashboard accents)
  html += `<div class="pv-kpis">
    <div class="pv-kpi k-amber"><div class="pv-kpi-lbl">Total savings</div><div class="pv-kpi-val">${fmtE(total)}</div><div class="pv-kpi-sub">${DATA.dates[li]}</div></div>
    <div class="pv-kpi k-green"><div class="pv-kpi-lbl">Growth</div><div class="pv-kpi-val">+${growth}%</div><div class="pv-kpi-sub">${DATA.dates[0]} → ${DATA.dates[li]}</div></div>
    <div class="pv-kpi k-cyan"><div class="pv-kpi-lbl">Proj. at age 18</div><div class="pv-kpi-val">${fmtE(totalEst)}</div><div class="pv-kpi-sub">BND Verwachte markt</div></div>
    <div class="pv-kpi k-blue"><div class="pv-kpi-lbl">Avg per kid</div><div class="pv-kpi-val">${fmtE(total/4)}</div><div class="pv-kpi-sub">across 3 accounts</div></div>
  </div>`;

  // ── Per-kid cards
  html += `<div class="pv-section"><div class="pv-section-title">Per kid</div><div class="pv-cards">`;
  KID_CONFIG.forEach(cfg => {
    const kd = DATA.kids[cfg.id];
    const kt = kidTotal(cfg.id, li);
    const kPrev = kidTotal(cfg.id, 0);
    const kGrow = kPrev > 0 ? '+'+((kt-kPrev)/kPrev*100).toFixed(1)+'%' : '—';
    const est = projectedAt18(cfg.id);
    const age = Math.floor((new Date() - new Date(cfg.dob)) / (365.25*24*3600*1000));
    const yrs18 = yearsTo18(cfg.dob);

    let rows = '';
    cfg.accounts.forEach((acc, i) => {
      const v = kd.accounts[i] ? kd.accounts[i][li] : null;
      rows += `<div class="pv-card-row">
        <span class="pv-card-lbl">${acc.label}</span>
        <span class="pv-card-val">${v != null ? fmtE(v) : '—'}</span>
      </div>`;
    });

    html += `<div class="pv-card">
      <div class="pv-card-stripe" style="background:${cfg.color}"></div>
      <div class="pv-card-body">
        <div class="pv-card-hdr">
          <div>
            <div class="pv-card-name">${cfg.name}</div>
            <div class="pv-card-dob">b. ${cfg.dob} · age ${age} · ${yrs18.toFixed(1)}y to 18</div>
          </div>
          <div>
            <div class="pv-card-total" style="color:${cfg.color}">${fmtE(kt)}</div>
            <div class="pv-card-growth" style="color:${cfg.color}">${kGrow}</div>
          </div>
        </div>
        <div class="pv-card-rows">${rows}</div>
        <div class="pv-card-est">
          <span class="pv-card-est-lbl">Projected at 18 (BND)</span>
          <span class="pv-card-est-val" style="color:${cfg.color}">${fmtE(est)}</span>
        </div>
      </div>
    </div>`;
  });
  html += `</div></div>`;

  // ── Account-level breakdown table
  html += `<div class="pv-section"><div class="pv-section-title">Account breakdown · ${DATA.dates[li]}</div>
    <table class="pv-tbl">
      <thead><tr>
        <th>Account</th>
        <th>${DATA.dates[0]}</th>
        <th>${DATA.dates[li]}</th>
        <th>Δ</th>
        <th>BND est. at 18</th>
      </tr></thead>
      <tbody>`;
  KID_CONFIG.forEach(cfg => {
    const kd = DATA.kids[cfg.id];
    html += `<tr class="pv-kid-row"><td colspan="5" style="color:${cfg.color}">${cfg.name}</td></tr>`;
    cfg.accounts.forEach((acc, i) => {
      const vals = kd.accounts[i] || [];
      const v0 = vals[0], v1 = vals[li];
      const d = (v0 != null && v1 != null) ? '+'+(((v1-v0)/v0)*100).toFixed(1)+'%' : '—';
      const est = kd.estAt18?.[i];
      html += `<tr>
        <td>${acc.label}<span class="pv-acct">${acc.acct}</span></td>
        <td>${v0 != null ? fmtE(v0) : '—'}</td>
        <td>${v1 != null ? fmtE(v1) : '—'}</td>
        <td>${d}</td>
        <td>${est != null ? fmtE(est) : '—'}</td>
      </tr>`;
    });
    const t0 = kidTotal(cfg.id, 0), t1 = kidTotal(cfg.id, li);
    const tD = t0 > 0 ? '+'+(((t1-t0)/t0)*100).toFixed(1)+'%' : '—';
    const tEst = projectedAt18(cfg.id);
    html += `<tr class="pv-total-row">
      <td>${cfg.name} total</td>
      <td>${fmtE(t0)}</td>
      <td>${fmtE(t1)}</td>
      <td>${tD}</td>
      <td>${fmtE(tEst)}</td>
    </tr>`;
  });
  const g0 = allTotal(0), g1 = allTotal(li);
  const gD = g0 > 0 ? '+'+(((g1-g0)/g0)*100).toFixed(1)+'%' : '—';
  const gEst = KID_CONFIG.reduce((s,k)=>s+projectedAt18(k.id),0);
  html += `<tr class="pv-grand-row">
    <td>Grand total</td>
    <td>${fmtE(g0)}</td>
    <td>${fmtE(g1)}</td>
    <td>${gD}</td>
    <td>${fmtE(gEst)}</td>
  </tr>
  </tbody></table></div>`;

  html += `<div class="pv-footer">
    <span>Source: BrandNewDay waardeoverzichten</span>
    <span>arbor-kids-savings.vercel.app</span>
  </div>`;

  document.getElementById('printView').innerHTML = html;
}

function exportPDF(){
  buildPrintView();
  const el = document.getElementById('printView');
  const lastDate = (DATA.dates[DATA.dates.length - 1] || 'latest').replace(/['"\s]/g, '');
  const filename = `Kids_Savings_${lastDate}.pdf`;

  // Style the element so html2canvas can read it
  const originalCss = el.style.cssText;
  el.style.cssText = `
    display:block;background:#020c1a;color:#e8f0f8;
    padding:9mm 10mm;width:794px;min-height:1123px;
    position:fixed;left:0;top:0;z-index:-1;opacity:0;
    font-family:'IBM Plex Sans',sans-serif;
  `;

  // Allow layout to settle
  requestAnimationFrame(() => requestAnimationFrame(() => {
    html2canvas(el, {
      scale: 2,
      backgroundColor: '#020c1a',
      logging: false,
      width: 794,
      windowWidth: 794,
      onclone: (clonedDoc) => {
        const c = clonedDoc.getElementById('printView');
        if (c) {
          c.style.cssText = 'display:block;background:#020c1a;color:#e8f0f8;padding:9mm 10mm;width:794px;min-height:1123px;position:relative;left:0;top:0;opacity:1;z-index:auto;font-family:"IBM Plex Sans",sans-serif;';
        }
      }
    }).then(canvas => {
      el.style.cssText = originalCss;
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
      const pdfW = 210, pdfH = 297;
      const ratio = canvas.width / canvas.height;
      const imgH = pdfW / ratio;
      pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, Math.min(imgH, pdfH));
      pdf.save(filename);
    }).catch(err => {
      console.error('PDF export failed:', err);
      el.style.cssText = originalCss;
      window.print();
    });
  }));
}

window.addEventListener('beforeprint', buildPrintView);

buildCharts();

writeCFFeeds(); // push current data to CF on load
</script>
